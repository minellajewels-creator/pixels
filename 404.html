<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Error Pixels</title>
  <script>
    // GitHub Pages SPA fix — redirects 404s back to index.html
    // so React Router can handle the route
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;
    var redirect = '/?p=' + encodeURIComponent(path) + (search ? '&q=' + encodeURIComponent(search.slice(1)) : '') + hash;
    window.location.replace(redirect);
  </script>
</head>
<body></body>
</html>
